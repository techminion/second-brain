<!-- Subject: Confirm your Second Brain email -->
<!--
  Supabase Auth "Confirm signup" template.
  Not active in the dev project: email confirmation is disabled there (ADR-19),
  and free-tier projects on the default SMTP cannot customize templates anyway
  (Supabase changelog 46599, 2026-06-03). Applied at CI-07 alongside custom SMTP.
-->
<div
  style="
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 24px;
    font-family: -apple-system, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif;
    color: #18181b;
  "
>
  <h1 style="font-size: 20px; font-weight: 600; margin: 0 0 16px">Confirm your email</h1>
  <p style="font-size: 14px; line-height: 1.6; margin: 0 0 24px">
    Confirm this address to finish setting up your Second Brain account.
  </p>
  <p style="margin: 0 0 24px">
    <a
      href="{{ .ConfirmationURL }}"
      style="
        display: inline-block;
        padding: 10px 20px;
        background-color: #2563eb;
        color: #ffffff;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        border-radius: 6px;
      "
      >Confirm email</a
    >
  </p>
  <p style="font-size: 12px; line-height: 1.6; color: #71717a; margin: 0 0 8px">
    If the button does not work, paste this link into your browser:
  </p>
  <p
    style="
      font-size: 12px;
      line-height: 1.6;
      color: #71717a;
      margin: 0 0 24px;
      word-break: break-all;
    "
  >
    {{ .ConfirmationURL }}
  </p>
  <p style="font-size: 12px; line-height: 1.6; color: #71717a; margin: 0">
    If you did not create a Second Brain account, you can ignore this email.
  </p>
</div>
